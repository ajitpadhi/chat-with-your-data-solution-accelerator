name: v2 frontend checks (lint + typecheck + vitest)

# ADR 0014 (2026-06-02): hard CI gate for the v2 frontend.
#
# The v2 frontend is an npm workspace rooted at the repo root with two members:
#   - `src/frontend`          -- the React 19 + TS + Vite 7 application.
#   - `tests/frontend`        -- the Vitest tree (sibling workspace member).
# A single `npm ci` at the workspace root produces one hoisted
# `node_modules` shared by both members, so the test tree resolves the
# frontend's deps natively (one React instance, no resolver shims).
#
# Gates, all run after the root install:
#   1. `npm run lint`                  -- ESLint flat config, both members.
#   2. `npx tsc -p src/frontend`       -- app type-check (noEmit).
#   3. `npx tsc -p tests/frontend`     -- test-tree type-check (noEmit).
#   4. `npm test`                      -- vitest run (the suite under
#                                         tests/frontend).
#
# Mirrors `v2-typecheck.yml` (backend pyright) and `v2-backend-only-smoke.yml`
# (backend smoke). Path-scoped so unrelated edits do not pay CI cost.

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/frontend/**"
      - "tests/frontend/**"
      - ".github/workflows/v2-frontend-checks.yml"
  pull_request:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/frontend/**"
      - "tests/frontend/**"
      - ".github/workflows/v2-frontend-checks.yml"
  workflow_dispatch:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install workspace (npm ci, frozen lockfile, hoisted node_modules)
        run: npm ci

      - name: Lint (ESLint strict-type-checked, both workspace members)
        run: npm run lint

      - name: Typecheck app (tsc strict + noUncheckedIndexedAccess + exactOptionalPropertyTypes)
        run: npx tsc -p src/frontend

      - name: Typecheck tests (tsc strict, test tree)
        run: npx tsc -p tests/frontend

      - name: Vitest (npm test)
        run: npm test
